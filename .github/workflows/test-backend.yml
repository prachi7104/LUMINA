name: Test Backend

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r api/requirements-dev.txt

      - name: Run Ruff lint
        run: ruff check api/ --exclude api/venv

      # Integration tests (@pytest.mark.integration) are excluded in CI to avoid
      # consuming API quota. Run integration tests manually before deployment.
      - name: Run backend unit tests (no integration)
        working-directory: api
        env:
          GROQ_API_KEY_HEAVY: ${{ secrets.GROQ_API_KEY_HEAVY }}
          GROQ_API_KEY_LIGHT: ${{ secrets.GROQ_API_KEY_LIGHT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: pytest tests/ -v -m "not integration"
