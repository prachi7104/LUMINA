[pytest]
markers =
    integration: marks tests that make real external API calls (Groq, Supabase, Google)
    smoke: marks pre-demo smoke tests that require a reachable API
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = true
log_level = WARNING
filterwarnings =
    ignore::DeprecationWarning:gotrue
    ignore::DeprecationWarning:httpx
    error::pytest.PytestUnknownMarkWarning
